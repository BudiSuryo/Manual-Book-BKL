backend:
  name: git-gateway
  branch: main # Pastikan sesuai dengan branch utama kamu

media_folder: "assets/img" # Folder tempat menyimpan gambar yang diupload
public_folder: "/assets/img"

collections:
  - name: "panduan"
    label: "Daftar Panduan"
    folder: "pages" # Folder tempat file panduan kamu berada
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Tanggal Publish", name: "date", widget: "datetime"}
      - {label: "Gambar Ilustrasi", name: "image", widget: "image"}
      - {label: "Isi Panduan", name: "body", widget: "markdown"}
