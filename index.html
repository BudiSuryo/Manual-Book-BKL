<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Manual Book BPR</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="logo2.png" rel="icon" type="image/png"/>
  <link href="logo2.png" rel="apple-touch-icon"/>
  
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <img alt="Logo" class="logo" src="logo2.png"/>
  
  <div class="login-box">   
    <h2>Login Manual Book</h2>
    <form onsubmit="return validateLogin()">
      <label for="role">Pilih Bagian:</label>
      <select id="role">
        <option value="pages/adm_kredit.html">Adm Kredit</option>
        <option value="pages/analis.html">Analis</option>
        <option value="pages/audit.html">Audit</option>
        <option value="pages/kasir.html">Kasir</option>
        <option value="pages/tabungan.html">Tabungan</option>
        <option value="pages/keuangan.html">Keuangan dan Pajak</option>
        <option value="pages/kolektor.html">Kolektor</option>
        <option value="pages/legal.html">Legal</option>
        <option value="pages/ga-umum.html">General Affairs</option>
        <option value="pages/hrd.html">HRD</option>
        <option value="pages/kacab.html">Kepala Cabang</option>
        <option value="pages/kabag_kredit.html">Kabag Kredit</option>
        <option value="pages/ka_back_office.html">Kabag Operasional</option>
        <option value="pages/gm_marketing.html">GM Marketing</option>
        <option value="pages/gm_ops.html">GM Operasional</option>
        <option value="pages/dir-bisnis.html">Direktur Bisnis</option>
        <option value="pages/dir-ops.html">Direktur Operasional</option>
        <option value="pages/untukteshtml.html">Chart</option>
      </select>
      <label for="password">Password:</label>
      <input type="password" id="password" required />
      <button type="submit">Masuk</button>
    </form>

    <!-- Tombol Khusus Admin (Opsional) -->
    <div style="margin-top: 20px; border-top: 1px solid #ccc; pt-10">
       <p style="font-size: 12px;">Punya akses Admin? <a href="#" onclick="netlifyIdentity.open()">Klik di sini untuk Login CMS</a></p>
    </div>
  </div>    
 
  <!-- Loading & Error Info -->
  <div id="loading" style="display:none;"><div class="spinner"></div></div>
  <div id="errorBox" class="error-box" style="display:none;"><p id="errorMessage"></p></div>

  <footer>
    <p>&copy; 2025 BPR Kreo Lestari - Manual Book</p>
  </footer>    

  <!-- Scripts -->
  <script src="js/validateLogin.js"></script> 
  <script>
    // Script agar setelah Login Admin langsung diarahkan ke folder /admin/
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    function hideLoading() {
        let loading = document.getElementById("loading");
        if (loading) loading.style.display = "none";
    }
    window.addEventListener("pageshow", function(event) {
        hideLoading();
    });
  </script>
</body>
</html>
