<!DOCTYPE html>
<html lang="id">
<script src="https://cdn.balkan.app/orgchart.js"></script>
<head>
  <meta charset="UTF-8">
  <title>Demo Chart</title>
  
</head>
<body>
  <div id="tree"></div>
    <script>

    let chart = new OrgChart("#tree", {
        // options
        nodeBinding: {
            field_0: "name"
        },
        nodes: [
            { id: 1, name: "Amber McKenzie" },
            { id: 2, pid: 1, name: "Ava Field" },
            { id: 3, pid: 1, name: "Peter Stevens" }
        ]  
    });
 
</script>
</body>
</html>
