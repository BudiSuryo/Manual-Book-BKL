<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Book Bagian Tabungan & Deposito - BPR</title>
    <link rel="stylesheet" href="/css/style.css">
    <script>
    // Proteksi halaman (jalankan secepat mungkin sebelum konten ditampilkan)
    if (sessionStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "index.html";
    }
    </script>
</head>
<body>
<div class="wrap">
    <!-- HEADER -->    
    <header>
      <img src="../logo2.png" alt="Logo" class="logo">
      <div class="brand-row">
          <div class="title">
          <h1>Manual Book Tabungan & Deposito</h1>
          <div class="sub">BPR Kreo Lestari</div>
        </div>
      </div>
      <nav class="top">
        <div class="breadcrumb">
          <a href="../index.html">Beranda</a> &gt;
          <a href="#">Tabungan & Deposito</a>
        </div>
      </nav>
    </header>

    <!-- DROPDOWN NAV -->
<div class="search-bar">
  <select id="headingDropdown" onchange="scrollToHeading(this.value)">
    <option value="">-- Pilih Topik Panduan --</option>
  </select>
</div>

<!-- Script Pemanggil & Pembuat Daftar Isi -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch('../content/adm-kredit.md')
    .then(response => response.text())
    .then(text => {
      const content = text.split('---').pop();
      const htmlContent = marked.parse(content);
      document.getElementById('isi-panduan-otomatis').innerHTML = htmlContent;

      // --- OTOMATISASI DAFTAR ISI ---
      const displayArea = document.getElementById('isi-panduan-otomatis');
      const dropdown = document.getElementById('headingDropdown');
      const headings = displayArea.querySelectorAll('h2, h3'); // Ambil semua judul

      headings.forEach((heading, index) => {
        const id = 'heading-' + index;
        heading.setAttribute('id', id); // Beri ID otomatis ke judul

        const option = document.createElement('option');
        option.value = id;
        option.text = (heading.tagName === 'H3' ? '--- ' : '') + heading.innerText;
        dropdown.appendChild(option);
      });
    });

  // Fungsi Scroll
  function scrollToHeading(id) {
    if (id) {
      const element = document.getElementById(id);
      if (element) {
        element.scrollIntoView({ behavior: 'smooth' });
      }
    }
  }
</script>

  <!-- GRID 3 KOLOM -->
  <div class="grid-3col">
    <!-- KOLOM KIRI (aksen warna / kosong) -->
    <aside class="accent"></aside>
      
         <div id="isi-panduan-otomatis">
          <p style="text-align: center; padding: 50px;">Memuat panduan terbaru...</p>
      </div>

      <!-- Script untuk memproses tulisan dari Admin -->
      <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
      <script>
        // Mengambil data dari folder content yang dibuat Admin
        fetch('../content/tabungan.md') 
          .then(response => {
            if (!response.ok) throw new Error("File tidak ditemukan");
            return response.text();
          })
          .then(text => {
            // Memisahkan metadata CMS dan mengambil isi tulisan saja
            const content = text.split('---').pop(); 
            
            // Memasukkan hasil tulisan ke dalam halaman
            document.getElementById('isi-panduan-otomatis').innerHTML = marked.parse(content);
          })
          .catch(err => {
            console.error(err);
            document.getElementById('isi-panduan-otomatis').innerHTML = 
              "<div style='padding:20px; background:#fff3cd; color:#856404; border-radius:8px;'>" +
              "<strong>Belum ada konten:</strong> Admin belum mengisi panduan di dashboard untuk bagian ini." +
              "</div>";
          });
      </script> 
  </main>

    <!-- KOLOM KANAN (aksen warna / kosong) -->
    <aside class="accent"></aside>
  </div>

  <!-- FOOTER -->
    <footer>
        <p>&copy; 2025 BPR - Manual Book Bagian Tabungan & Deposito</p>
    </footer>
</body>
</html>

<script src="/js/script2.js" defer></script>

<script>
(function() {
  // fungsi untuk load script dinamis
  function loadScript(src, onSuccess, onError) {
    const s = document.createElement("script");
    s.src = src;
    s.defer = true;
    s.onload = onSuccess;
    s.onerror = onError;
    document.head.appendChild(s);
  }

  // coba load script2.js dulu
  loadScript("/js/script2.js", 
    function() {
      console.log("✅ script2.js berhasil dimuat");
    },
    function() {
      console.warn("⚠️ script2.js tidak ada, coba fallback ke script.js");
      loadScript("/js/script.js", function() {
        console.log("✅ script.js berhasil dimuat sebagai fallback");
      });
    }
  );
})();
</script>
